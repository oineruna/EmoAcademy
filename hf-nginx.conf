server {
  listen 7860;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri.html $uri/ /index.html;
  }

  location /_next/static/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location = /env.js {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }
}
